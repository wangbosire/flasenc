# 【完全可选】本地标准开发路径：本机安装 MySQL + DATABASE_URL，不要求 Docker。
# 本文件仅给「想用容器临时起 MySQL」的同学；未安装 Docker 请忽略，无需执行 pnpm db:compose:*。
# 若使用本 compose，在 apps/server 执行：docker compose -f docker-compose.mysql.yml up -d
# 并设置 DATABASE_URL=mysql://root:root123..@127.0.0.1:3307/flasenc（宿主映射 3307）。
services:
  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123..
      MYSQL_DATABASE: flasenc
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
