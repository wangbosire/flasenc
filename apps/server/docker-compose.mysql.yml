# 兼容入口：仅启动 MySQL。完整 Docker 开发请优先使用仓库根目录 `compose.yml`。
# 若单独使用本文件，在 apps/server 执行：docker compose -f docker-compose.mysql.yml up -d
# 宿主机连接串：DATABASE_URL=mysql://root:root123..@127.0.0.1:3307/flasenc
services:
  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123..
      MYSQL_DATABASE: flasenc
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
